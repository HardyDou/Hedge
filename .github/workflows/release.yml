name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libayatana-appindicator3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../hedge-linux-x64.tar.gz *

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: hedge-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath hedge-windows-x64.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: hedge-windows-x64.zip

  build-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: hedge-cli-macos-arm64
            output: hedge
          - os: ubuntu-latest
            artifact: hedge-cli-linux-x64
            output: hedge
          - os: windows-latest
            artifact: hedge-cli-windows-x64.exe
            output: hedge.exe
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build CLI
        run: |
          cd cli
          dart pub get
          dart compile exe bin/hedge.dart -o ${{ matrix.output }}

      - name: Package CLI Artifact
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd cli
          tar -czf ../hedge-cli-linux-x64.tar.gz ${{ matrix.output }}

      - name: Build .deb and .rpm packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p build
          cp cli/${{ matrix.output }} build/hedge
          chmod +x scripts/build-deb.sh scripts/build-rpm.sh
          ./scripts/build-deb.sh ${{ github.ref_name }}
          sudo apt-get install -y rpm
          ./scripts/build-rpm.sh ${{ github.ref_name }}

      - name: Package CLI Artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd cli
          tar -czf ../hedge-cli-macos-arm64.tar.gz ${{ matrix.output }}

      - name: Package CLI Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd cli
          powershell Compress-Archive -Path ${{ matrix.output }} -DestinationPath ../hedge-cli-windows-x64.zip

      - name: Upload CLI Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: hedge-cli-linux-x64.tar.gz

      - name: Upload .deb package
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: hedge-cli-deb
          path: dist/deb/*.deb

      - name: Upload .rpm package
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: hedge-cli-rpm
          path: dist/rpm/output/*.rpm

      - name: Upload CLI Artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: hedge-cli-macos-arm64.tar.gz

      - name: Upload CLI Artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: hedge-cli-windows-x64.zip

  release:
    needs: [build-android, build-linux, build-windows, build-cli]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android-apk/app-release.apk
            linux-x64/hedge-linux-x64.tar.gz
            windows-x64/hedge-windows-x64.zip
            hedge-cli-macos-arm64/hedge-cli-macos-arm64.tar.gz
            hedge-cli-linux-x64/hedge-cli-linux-x64.tar.gz
            hedge-cli-windows-x64.exe/hedge-cli-windows-x64.zip
            hedge-cli-deb/*.deb
            hedge-cli-rpm/*.rpm
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: HardyDou/homebrew-hedge
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Compute SHA256 checksums
        id: sha
        run: |
          VERSION="${{ github.ref_name }}"
          BASE="https://github.com/HardyDou/hedge/releases/download/${VERSION}"
          SHA_MACOS=$(curl -sL "${BASE}/hedge-cli-macos-arm64.tar.gz" | sha256sum | awk '{print $1}')
          SHA_LINUX=$(curl -sL "${BASE}/hedge-cli-linux-x64.tar.gz" | sha256sum | awk '{print $1}')
          echo "sha_macos=${SHA_MACOS}" >> $GITHUB_OUTPUT
          echo "sha_linux=${SHA_LINUX}" >> $GITHUB_OUTPUT
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" homebrew-tap/Formula/hedge.rb
          sed -i "/hedge-cli-macos-arm64/{n;s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.sha_macos }}\"/}" homebrew-tap/Formula/hedge.rb
          sed -i "/hedge-cli-linux-x64/{n;s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.sha_linux }}\"/}" homebrew-tap/Formula/hedge.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hedge.rb
          git commit -m "chore: update hedge to ${{ github.ref_name }}"
          git push
